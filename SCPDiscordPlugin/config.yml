        server: [ "default" ]
    onbanissued:
        ip: [ "staff" ]
        userid: [ "staff" ]
    onbanupdated:
        ip: []
        userid: []
    onbanrevoked:
        ip: [ "staff" ]
        userid: [ "staff" ]
    onkick:
        player: [ "default", "staff" ]
        server: [ "default", "staff" ]
    onplayermuted:

      message: "<var:target-name> (<var:target-userid>) 님이 <var:attacker-name> (<var:attacker-userid>) 님에게 <var:damagetype>으로 사망했습니다."
      regex: ["으로 UNKNOWN":"으로 알 수 없는 방법"]
    friendlyfire:
      message: "**<var:target-team> <var:target-name> (<var:target-userid>) 님이 팀원 <var:attacker-team> <var:attacker-name> (<var:attacker-userid>) 님에게 <var:damagetype>으로 팀킬당했습니다.**"
      regex: ["으로 UNKNOWN":"으로 알 수 없는 방법"]
    nokiller:
      message: "<var:target-name> (<var:target-userid>) 님이 <var:damagetype>으로 사망했습니다."
      regex: ["으로 UNKNOWN":"알 수 없는 방법으로 사망"]

  onplayerpickupitem:
    # item - Item
    # player - Player
    message: "<var:player-name> (<var:player-userid>) 님이 <var:item>을(를) 주웠습니다."
    regex: []
    cancel_regex: []

  onplayerpickupammo:

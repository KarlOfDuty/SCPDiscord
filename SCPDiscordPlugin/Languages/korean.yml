messages:
  onroundstart:
    message: "**라운드가 시작되었습니다.**"
    regex: []
    cancel_regex: []

  onconnect:
    # ipaddress - 문자열
    # userid - 문자열
    # jointype - CentralAuthPreauthFlags
    # region - 문자열
    message: "플레이어 (<var:userid>) 접속 시도 중..."
    regex: []
    cancel_regex: []

  onplayerleave:
    # ipaddress - 문자열
    # playerid - 정수
    # steamid - 문자열
    # name - 문자열
    message: "**<var:player-name> (<var:player-userid>) 님이 게임에서 나갔습니다.**"
    regex: []
    cancel_regex: []

  onroundend:
    # duration - 정수 (라운드 시간)
    # leadingteam - 문자열 (승리 팀)
    # dclassalive - 정수 (생존 D계급)
    # dclassdead - 정수 (사망 D계급)
    # dclassescaped - 정수 (탈출 D계급)
    # dclassstart - 정수 (시작 D계급 수)
    # mtfalive - 정수 (생존 MTF)
    # mtfdead - 정수 (사망 MTF)
    # mtfstart - 정수 (시작 MTF 수)
    # scientistsalive - 정수 (생존 과학자)
    # scientistsdead - 정수 (사망 과학자)
    # scientistsescaped - 정수 (탈출 과학자)
    # scientistsstart - 정수 (시작 과학자 수)
    # scpalive - 정수 (생존 SCP)
    # scpdead - 정수 (격리된 SCP)
    # scpkills - 정수 (SCP 처치 수)
    # scpstart - 정수 (시작 SCP 수)
    # warheaddetonated - 불리언 (핵탄두 폭발 여부)
    # warheadkills - 정수 (핵탄두 사망자 수)
    # zombiesalive - 정수 (생존 좀비)
    # zombieschanged - 정수 (좀비로 변환된 수)
    message: >+
      **라운드가 <var:duration>분 후 종료되었습니다. 승리: <var:leadingteam>.**
      ```
      탈출한 D계급:       <var:dclassescaped>/<var:dclassstart>\n
      구조된 과학자:      <var:scientistsescaped>/<var:scientistsstart>\n
      격리된 SCP:         <var:scpdead>/<var:scpstart>\n
      SCP에게 사망:       <var:scpkills>\n
      핵탄두switchswas<var:warheaddetonated> 폭발했습니다.
      ```
    regex: ["switchswasTrue":"가","switchswasFalse":"가 폭발하지 않았습니다.\n핵탄두는"]

  onwaitingforplayers:
    message: "**서버가 준비되어 플레이어를 기다리고 있습니다.**"
    regex: []
    cancel_regex: []

  onroundrestart:
    message: "**라운드가 재시작됩니다...**"
    regex: []
    cancel_regex: []

  onsetservername:
    # servername - 문자열
    message: "**서버 이름: <var:servername>.**"
    regex: []
    cancel_regex: []

  onscp914activate:
    # knobsetting - KnobSetting
    # player - Player
    message: "<var:player-name> (<var:player-userid>) 님이 SCP-914를 <var:knobsetting> 설정으로 작동시켰습니다."
    regex: []
    cancel_regex: []

  onstartcountdown:
    player:
      # isAutomatic - 불리언
      # timeleft - 실수 (남은 시간)
      # player - Player
      initiated:
        message: "**<var:player-name> (<var:player-userid>) 님이 알파 핵탄두를 활성화했습니다. 폭발까지 <var:timeleft>초 남았습니다. 모든 인원은 즉시 대피하십시오.**"
        regex: [ ]
      resumed:
        message: "**<var:player-name> (<var:player-userid>) 님이 알파 핵탄두를 재개했습니다. 폭발까지 <var:timeleft>초 남았습니다.**"
        regex: [ ]
    server:
      # isAutomatic - 불리언
      # timeleft - 실수 (남은 시간)
      initiated:
        message: "**O5 위원회의 명령으로 알파 핵탄두가 원격 활성화되었습니다. 모든 인원은 즉시 대피하십시오.**"
        regex: []
        cancel_regex: []
      resumed:
        message: "**O5 위원회의 명령으로 알파 핵탄두 카운트다운이 원격 재개되었습니다. 폭발까지 <var:timeleft>초 남았습니다.**"
        regex: []
        cancel_regex: []

  onstopcountdown:
    default:
      # timeleft - 남은 시간
      # player - Player
      message: "**<var:player-name> (<var:player-userid>) 님이 <var:timeleft>초를 남기고 알파 핵탄두 폭발을 취소했습니다.**"
      regex: []
      cancel_regex: []
    noplayer:
      # timeleft - 남은 시간
      message: "**윤리위원회의 명령으로 <var:timeleft>초를 남기고 알파 핵탄두 폭발이 원격 취소되었습니다.**"
      regex: []
      cancel_regex: []

  ondetonate:
    message: "**알파 핵탄두 폭발이 감지되었습니다. MTF 대원들이 잔여 위협을 제거하기 위해 시설에 진입 중입니다.**"
    regex: []
    cancel_regex: []

  ondecontaminate:
    message: "**저위험군 오염 제거가 시작되었습니다. 모든 생물학적 물질이 소멸됩니다.**"
    regex: []
    cancel_regex: []

  onsummonvehicle:
    chaos:
      message: "**경고: 허가되지 않은 차량이 시설 경계를 침범했습니다.**"
      regex: []
      cancel_regex: []
    mtf:
      message: "**MTF 헬기가 시설 시야 범위에 진입했습니다. 착륙 준비 중입니다.**"
      regex: []
      cancel_regex: []

  ongeneratorfinish:
    # room - 문자열
    # player - Player
    message: "<var:room>의 발전기가 활성화되었습니다."
    regex: [ ]

  onplayerhurt:
    # damage - 실수 (피해량)
    # damagetype - DamageType (피해 유형)
    # attacker - Player
    # target - Player
    default:
      message: "<var:target-name> (<var:target-userid>) 님이 <var:attacker-name> (<var:attacker-userid>) 님에게 <var:damagetype>으로 피해를 받았습니다 (<var:damage> HP)."
      regex: ["으로 UNKNOWN":"으로 알 수 없는 방법", "-1 damage":"막대한 피해"]
    friendlyfire:
      message: "**<var:target-team> <var:target-name> (<var:target-userid>) 님이 팀원 <var:attacker-team> <var:attacker-name> (<var:attacker-userid>) 님에게 <var:damagetype>으로 공격받았습니다 (<var:damage> HP).**"
      regex: ["으로 UNKNOWN":"으로 알 수 없는 방법", "-1 damage":"막대한 피해"]
    noattacker:
      message: "<var:target-name> (<var:target-userid>) 님이 <var:damagetype>으로 <var:damage> 피해를 받았습니다."
      regex: ["damage by UNKNOWN":"알 수 없는 원인으로 피해", "-1 damage":"막대한 피해"]

  onplayerdie:
    # damagetype - DamageType
    # attacker - Player
    # target - Player

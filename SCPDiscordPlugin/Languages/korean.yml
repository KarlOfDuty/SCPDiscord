#####################################################################################################################
#
#                                                     이벤트
#
#   message: 표시될 메시지. 변수는 <var:이름> 형식으로 삽입됩니다. 예: <var:ipaddress>
#   regex: 메시지의 일부를 찾아 교체하기 위한 정규식과 대체 문자열 쌍
#
#####################################################################################################################

#####################################################################################################################
#
#                                                  플레이어 정보
#
#  아래 많은 이벤트에 "Player" 타입의 변수가 있습니다. 이는 다양한 플레이어 정보를 담은
#  변수들을 제공한다는 의미입니다. 최신 변수 목록은 Git 저장소의 APIExtensions.cs 파일에서 확인하세요.
#
#  사용 예시:
#  이벤트에 Player 타입의 "attacker" 변수가 있다면 <var:attacker-name>으로 닉네임을 가져올 수 있습니다.
#  모든 플레이어 하위 변수에 동일하게 적용됩니다 (disarmer 변수 제외).
#  disarmer 변수도 Player 타입이므로, "attacker"가 수갑이 채워졌다면
#  <var:attacker-disarmer-name>으로 수갑을 채운 플레이어의 이름을 가져올 수 있습니다.
#
#  플레이어 하위 변수 목록:
#  -ipaddress      (IP 주소)
#  -name           (닉네임)
#  -id             (플레이어 ID)
#  -userid         (유저 ID)
#  -role           (역할)
#  -team           (팀)
#  -donottrack     (추적 거부 여부)
#  -health         (체력)
#  -isdisarmed     (수갑 여부)
#  -isalive        (생존 여부)
#  -ismuted        (음소거 여부)
#  -hasreservedslot (예약 슬롯 보유 여부)
#  -isglobalmod    (글로벌 모더레이터 여부)
#  -isintercommuted (인터컴 음소거 여부)
#  -hasfullinventory (인벤토리 가득 참 여부)
#  -hasnoitems     (아이템 없음 여부)
#  -isnortwoodstaff (Northwood 직원 여부)
#  -overwatchon    (오버워치 활성화 여부)
#  -noclipon       (노클립 활성화 여부)
#  -godmodeon      (갓모드 활성화 여부)
#  -isoutofammo    (탄약 없음 여부)
#  -hasremoteadminaccess (원격 관리자 권한 여부)
#  -bypassenabled  (바이패스 활성화 여부)
#  -isscp          (SCP 여부)
#  -ismtf          (MTF 여부)
#  -ischaos        (혼돈의 반란 여부)
#  -ishuman        (인간 여부)
#  -rank           (랭크)
#  -playtimehours  (플레이 시간 (시간 단위))
#
######################################################################################################################

